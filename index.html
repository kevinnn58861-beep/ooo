<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SATURNUS V5 - FINAL REVISION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #0ff; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; border-left: 3px solid #0ff; padding-left: 15px; pointer-events: none; }
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 180px; height: 135px; border: 1px solid #333; border-radius: 10px; overflow: hidden; transform: scaleX(-1); }
        .instruksi { font-size: 11px; color: #666; margin-top: 5px; }
        h2 { margin: 0; font-size: 20px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 id="status">INIT CAMERA...</h2>
        <div class="instruksi">
            • Telunjuk: SUPERNOVA (Meledak)<br>
            • Tengah: EIFFEL TOWER<br>
            • Manis: ROCKET MODE<br>
            • Jempol-Kelingking: ZOOM
        </div>
    </div>

    <video id="input_video" style="display:none"></video>
    <div id="video-container"><canvas id="output_canvas" style="width:100%; height:100%; object-fit:cover;"></canvas></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- SETUP THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const group = new THREE.Group();
        scene.add(group);

        const COUNT = 15000;
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(COUNT * 3);
        const target = new Float32Array(COUNT * 3);
        const colors = new Float32Array(COUNT * 3);

        // --- BUAT BENTUK SATURNUS DEFAULT ---
        function resetToSaturn() {
            for (let i = 0; i < COUNT; i++) {
                let x, y, z;
                if (i < 7000) { // Planet
                    const r = 4 * Math.pow(Math.random(), 0.5);
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                } else { // Cincin
                    const a = Math.random() * Math.PI * 2;
                    const r = 6 + Math.random() * 4;
                    x = Math.cos(a) * r;
                    y = (Math.random() - 0.5) * 0.2;
                    z = Math.sin(a) * r;
                }
                target[i*3] = x; target[i*3+1] = y; target[i*3+2] = z;
                const col = new THREE.Color(i < 7000 ? 0xffcc00 : 0x00ffff);
                colors[i*3] = col.r; colors[i*3+1] = col.g; colors[i*3+2] = col.b;
            }
        }
        resetToSaturn();
        // Set posisi awal sama dengan target
        for(let i=0; i<COUNT*3; i++) pos[i] = target[i];

        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const mat = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true });
        const points = new THREE.Points(geo, mat);
        group.add(points);

        camera.position.z = 25;

        // --- HAND TRACKING LOGIC ---
        let mode = "NORMAL";
        let targetZ = 25;
        const statusEl = document.getElementById('status');

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults(res => {
            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const lm = res.multiHandLandmarks[0];
                
                // Zoom (Jarak jempol-kelingking)
                const d = Math.hypot(lm[4].x - lm[20].x, lm[4].y - lm[20].y);
                targetZ = 45 - (d * 55);

                // Deteksi Jari
                const f8 = lm[8].y < lm[6].y;   // Telunjuk
                const f12 = lm[12].y < lm[10].y; // Tengah
                const f16 = lm[16].y < lm[14].y; // Manis

                if (f8 && !f12) mode = "BOOM";
                else if (f12 && !f16) mode = "EIFFEL";
                else if (f16) mode = "ROCKET";
                else mode = "NORMAL";

                statusEl.innerText = mode === "NORMAL" ? "SATURNUS MODE" : "MODE: " + mode;
            } else {
                statusEl.innerText = "MENCARI TANGAN...";
                mode = "NORMAL";
            }
        });

        const cam = new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 640, height: 480
        });
        cam.start();

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const p = geo.attributes.position.array;

            for (let i = 0; i < COUNT; i++) {
                let tx = target[i*3], ty = target[i*3+1], tz = target[i*3+2];

                if (mode === "BOOM") {
                    p[i*3] += (Math.random() - 0.5) * 1.5;
                    p[i*3+1] += (Math.random() - 0.5) * 1.5;
                    p[i*3+2] += (Math.random() - 0.5) * 1.5;
                } else if (mode === "EIFFEL") {
                    const h = (i / COUNT) * 16;
                    const taper = Math.pow(1 - (h / 16), 2) * 4.5;
                    tx = (Math.random() - 0.5) * taper;
                    ty = h - 8;
                    tz = (Math.random() - 0.5) * taper;
                } else if (mode === "ROCKET") {
                    const h = (i / COUNT) * 12;
                    let r = 1.2;
                    if (h > 9) r = 1.2 * (1 - (h-9)/3);
                    const ang = Math.random() * 6.28;
                    tx = Math.cos(ang) * r;
                    ty = h - 6;
                    tz = Math.sin(ang) * r;
                    if (h < 2 && i % 8 === 0) { tx *= 2.5; tz *= 2.5; } // Sirip
                }

                if (mode !== "BOOM") {
                    p[i*3] += (tx - p[i*3]) * 0.1;
                    p[i*3+1] += (ty - p[i*3+1]) * 0.1;
                    p[i*3+2] += (tz - p[i*3+2]) * 0.1;
                }
            }

            geo.attributes.position.needsUpdate = true;
            camera.position.z += (targetZ - camera.position.z) * 0.1;
            group.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
